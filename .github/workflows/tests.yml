name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9/3.10 exercise the no-tomllib regex fallback in manifest_scan;
        # 3.11+ exercise the tomllib path. grounded has no dependencies, so
        # there is nothing to install — just run the offline suite.
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    name: tests (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite (offline)
        run: python -m unittest discover -s tests
